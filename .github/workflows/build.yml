name: Roman Number CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: CI Pipeline
    runs-on: ubuntu-latest

    steps:
      # scaricamento del codice sorgente dal repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # configurazione dell'ambiente Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      # compilazione del progetto (fase compile)
      - name: Compile Project
        run: mvn compile

      # esecuzione dei test unitari (fase test)
      - name: Run JUnit Tests
        run: mvn test

      # analisi statica del codice (fase package) con checkstyle
      - name: Static Code Analysis (Checkstyle)
        run: mvn package
